services:
  # ============================================================
  # Nginx (Reverse Proxy + HTTPS termination)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: vp-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/ssl/certs/services/nginx.vp.local/nginx.vp.local.crt:/etc/nginx/certs/server.crt:ro
      - ./infra/ssl/certs/services/nginx.vp.local/nginx.vp.local.key:/etc/nginx/certs/server.key:ro
      - ./infra/ssl/certs/ca/ca.crt:/etc/nginx/certs/ca.crt:ro
      - ./infra/ssl/certs/services/minio.vp.local/minio.vp.local.crt:/etc/nginx/certs/minio.vp.local.crt:ro
      - ./infra/ssl/certs/services/minio.vp.local/minio.vp.local.key:/etc/nginx/certs/minio.vp.local.key:ro
    networks:
      vp-network:
        aliases:
          - vp.local
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # PostgreSQL
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: vp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vp_admin
      POSTGRES_PASSWORD: vp_secret
      POSTGRES_DB: lessons_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vp_admin -d lessons_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # MinIO (S3) с HTTPS
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: vp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret
      MINIO_BROWSER_REDIRECT_URL: https://minio.vp.local:9001
      MINIO_SERVER_URL: https://minio.vp.local:9000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - ./infra/ssl/certs/services/minio.vp.local/minio.vp.local.crt:/root/.minio/certs/public.crt:ro
      - ./infra/ssl/certs/services/minio.vp.local/minio.vp.local.key:/root/.minio/certs/private.key:ro
      - ./infra/ssl/certs/ca/ca.crt:/root/.minio/certs/CAs/ca.crt:ro
    networks:
      - vp-network
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # ✅ Инициализация MinIO (CORS + бакеты)
  # ============================================================
  minio-init:
    image: minio/mc:latest
    container_name: vp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio/init-cors.sh:/init-cors.sh:ro
    entrypoint: ["/bin/sh", "/init-cors.sh"]
    networks:
      - vp-network
    restart: "no"

  # ============================================================
  # RabbitMQ
  # ============================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: vp_rabbit
      RABBITMQ_DEFAULT_PASS: vp_rabbit_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - vp-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: vp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # WebApp (MVC Frontend)
  # ============================================================
  webapp:
    build:
      context: .
      dockerfile: src/WebApp/Dockerfile
    container_name: vp-webapp
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/webapp.vp.local.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=vp_secret
      - Storage__Endpoint=minio:9000
      - Storage__PublicEndpoint=minio.vp.local
      - Storage__AccessKey=minio_admin
      - Storage__SecretKey=minio_secret
      - Storage__Region=us-east-1
      - Storage__UseSSL=true
      - Storage__VideoStorageBucket=video-storage
      - Storage__VideoHlsBucket=video-hls
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=vp_rabbit
      - RabbitMq__Password=vp_rabbit_secret
      - RabbitMq__VirtualHost=/
    ports:
      - "5000:8080"
      - "5001:8081"
    volumes:
      - ${USERPROFILE}/.aspnet/https:/https:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vp-network

  # ============================================================
  # FileService API
  # ============================================================
  fileservice:
    build:
      context: .
      dockerfile: src/FileService/Dockerfile
    container_name: vp-fileservice
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/fileservice.vp.local.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=vp_secret
      - Storage__Endpoint=minio:9000
      - Storage__PublicEndpoint=minio.vp.local
      - Storage__AccessKey=minio_admin
      - Storage__SecretKey=minio_secret
      - Storage__Region=us-east-1
      - Storage__UseSSL=true
      - Storage__VideoStorageBucket=video-storage
      - Storage__VideoHlsBucket=video-hls
      - Storage__PresignedUrlExpirySeconds=3600
    ports:
      - "5100:8080"
      - "5101:8081"
    volumes:
      - ${USERPROFILE}/.aspnet/https:/https:ro
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - vp-network

  # ============================================================
  # LessonService API
  # ============================================================
  lessonservice:
    build:
      context: .
      dockerfile: src/LessonService/Dockerfile
    container_name: vp-lessonservice
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/lessonservice.vp.local.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=vp_secret
    ports:
      - "5200:8080"
      - "5201:8081"
    volumes:
      - ${USERPROFILE}/.aspnet/https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vp-network

  # ============================================================
  # FileService.Worker (Video Processing)
  # ============================================================
  fileservice-worker:
    build:
      context: .
      dockerfile: src/FileService.Worker/Dockerfile
    container_name: vp-fileservice-worker
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=Development
      - Storage__Endpoint=minio:9000
      - Storage__PublicEndpoint=webapp.vp.local
      - Storage__AccessKey=minio_admin
      - Storage__SecretKey=minio_secret
      - Storage__Region=us-east-1
      - Storage__UseSSL=true
      - Storage__VideoStorageBucket=video-storage
      - Storage__VideoHlsBucket=video-hls
      - Storage__PresignedUrlExpirySeconds=3600
      - RabbitMq__HostName=rabbitmq
      - RabbitMq__UserName=vp_rabbit
      - RabbitMq__Password=vp_rabbit_secret
    volumes:
      - ./infra/ssl/certs/ca/ca.crt:/app/certs/ca.crt:ro
    depends_on:
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - vp-network

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
  redis_data:

networks:
  vp-network:
    driver: bridge