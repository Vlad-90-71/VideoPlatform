# ============================================================
# WebSocket support для SignalR
# ============================================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================
# WebApp (MVC Frontend)
# ============================================================
upstream webapp_backend {
    server webapp:8081;
    keepalive 32;
}

server {
    listen 443 ssl;
    http2 on;
    server_name webapp.vp.local vp.local localhost;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_trusted_certificate /etc/nginx/certs/ca.crt;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ============================================================
    # Проксирование HLS файлов из MinIO (для плеера)
    # ============================================================
    location /video-hls/ {
        # ✅ ИСПРАВЛЕНО: передаём реальный Host, а не фиксированный
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_pass https://minio:9000;
        proxy_http_version 1.1;
        
        # Отключаем буферизацию для стриминга
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Игнорируем self-signed сертификат MinIO
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        
        # ✅ Скрываем дублирующиеся CORS заголовки от MinIO
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        
        # ✅ CORS для HLS стриминга (добавляем в Nginx)
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, Origin, X-Requested-With, Content-Type, Accept' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range, ETag' always;
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range, Origin, X-Requested-With, Content-Type, Accept' always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # MIME типы для HLS
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        
        # Кэширование HLS сегментов
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ============================================================
    # Проксирование прямой загрузки в MinIO (presigned URLs)
    # ============================================================
    location /video-storage/ {
        # ✅ ИСПРАВЛЕНО: передаём реальный Host (webapp.vp.local)
        # Это важно для валидации presigned URL!
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_pass https://minio:9000;
        proxy_http_version 1.1;
        
        # Игнорируем self-signed сертификат MinIO
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        
        # ✅ Скрываем дублирующиеся CORS заголовки от MinIO
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        
        # ✅ CORS для presigned URLs (добавляем в Nginx)
        add_header Access-Control-Allow-Origin 'https://webapp.vp.local' always;
        add_header Access-Control-Allow-Methods 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Amz-Date, X-Amz-Algorithm, X-Amz-Signature, X-Amz-Security-Token, X-Amz-Content-Sha256' always;
        add_header Access-Control-Expose-Headers 'ETag, x-amz-meta-custom-header' always;
        add_header Access-Control-Max-Age 3600 always;
        
        # Preflight (OPTIONS) запросы
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin 'https://webapp.vp.local' always;
            add_header Access-Control-Allow-Methods 'GET, PUT, POST, DELETE, HEAD, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Amz-Date, X-Amz-Algorithm, X-Amz-Signature, X-Amz-Security-Token, X-Amz-Content-Sha256' always;
            add_header Access-Control-Expose-Headers 'ETag, x-amz-meta-custom-header' always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # Увеличиваем таймауты для больших файлов
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Отключаем буферизацию для загрузки
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Максимальный размер загружаемого файла
        client_max_body_size 2000M;
    }

    # ============================================================
    # Основное приложение WebApp
    # ============================================================
    location / {
        proxy_pass https://webapp_backend;
        proxy_http_version 1.1;

        # WebSocket support для SignalR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Длинные таймауты для SignalR и долгих запросов
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# ============================================================
# MinIO S3 API (для presigned URLs через minio.vp.local)
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name minio.vp.local;

    ssl_certificate /etc/nginx/certs/minio.vp.local.crt;
    ssl_certificate_key /etc/nginx/certs/minio.vp.local.key;
    ssl_trusted_certificate /etc/nginx/certs/ca.crt;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass https://minio:9000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Игнорируем self-signed сертификат MinIO
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        
        # ✅ CORS управляется в MinIO через bucket policy
        # Nginx только проксирует
        
        # Увеличиваем таймауты для больших файлов
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Отключаем буферизацию для загрузки
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Максимальный размер загружаемого файла
        client_max_body_size 2000M;
    }
}

