# ============================================================
# RabbitMQ Configuration (упрощённая версия)
# ============================================================

# Логи
log.console = true
log.console.level = info

# AMQP (TCP, без SSL)
listeners.tcp.default = 5672

# Management UI (HTTP, без SSL — для простоты)
management.tcp.port = 15672

# Дефолтный пользователь
default_user = vp_rabbit
default_pass = vp_rabbit_secret
default_vhost = /

loopback_users.guest = false